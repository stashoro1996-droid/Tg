    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitClick Hardcore</title>
    <script src="https://telegram.org"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --gold: #f3ba2f; --bg: #000; --star: #62b1f6; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        .header { padding: 12px; text-align: center; color: var(--gold); font-weight: 800; font-size: 12px; letter-spacing: 1px; }
        .score-container { font-size: 44px; font-weight: 900; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .page { display: none; flex-direction: column; align-items: center; height: 82vh; padding: 20px; overflow-y: auto; }
        .active-page { display: flex; }

        /* Монета */
        .coin-section { flex-grow: 1; display: flex; align-items: center; justify-content: center; perspective: 1000px; position: relative; }
        .coin-card { width: 250px; height: 250px; transition: transform 0.1s; transform-style: preserve-3d; }
        .coin-img { width: 100%; filter: drop-shadow(0 0 30px rgba(243, 186, 47, 0.3)); pointer-events: none; }

        /* Магазин и Stars */
        .list-item { background: #111; padding: 15px; margin: 6px 0; border-radius: 18px; width: 100%; max-width: 340px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .item-info b { display: block; color: var(--gold); font-size: 15px; }
        .item-info small { color: #666; font-size: 11px; }
        
        .btn-buy { background: var(--gold); color: #000; padding: 10px 14px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; font-size: 12px; }
        .btn-stars { background: var(--star); color: #fff; padding: 10px 14px; border-radius: 10px; font-weight: 800; border: none; display: flex; align-items: center; gap: 4px; }

        .energy-box { width: 85%; padding-bottom: 40px; }
        .energy-bar { background: #1a1a1a; height: 12px; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid #333; }
        .energy-fill { background: var(--gold); height: 100%; width: 100%; transition: width 0.3s; }

        nav { display: flex; justify-content: space-around; background: #080808; padding: 18px 0; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; }
        nav div { font-size: 10px; color: #444; font-weight: 700; }
        nav .active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="game-page" class="page active-page">
        <div class="header" id="league-name">Bronze League</div>
        <div class="score-container">💰 <span id="balance-val">0</span></div>
        
        <div class="coin-section" id="click-area">
            <div class="coin-card" id="coin">
                <img src="https://githubusercontent.com" class="coin-img">
            </div>
        </div>

        <div class="energy-box">
            <div style="display: flex; justify-content: space-between; font-size: 13px;">
                <span>⚡️ <span id="energy-val">1000</span> / <span id="max-energy-val">1000</span></span>
                <span id="mult-status" style="color: #62b1f6; font-weight: bold;">X1</span>
            </div>
            <div class="energy-bar"><div id="energy-fill" class="energy-fill"></div></div>
        </div>
    </div>

    <div id="boosts-page" class="page">
        <h2 style="color: var(--gold)">Магазин (Месяц до 1M)</h2>
        
        <!-- Обычные бусты -->
        <div class="list-item">
            <div class="item-info"><b>Multitap</b><small>+1 за клик | Lvl <span id="mt-lvl">1</span></small></div>
            <button class="btn-buy" onclick="buyMT()" id="mt-btn">1k</button>
        </div>
        <div class="list-item">
            <div class="item-info"><b>Energy Limit</b><small>+500 лимит</small></div>
            <button class="btn-buy" onclick="buyEL()" id="el-btn">2.5k</button>
        </div>

        <h3 style="color: var(--star); margin-top: 20px;">Premium (Stars)</h3>
        <div class="list-item">
            <div class="item-info"><b>Ускорение X2</b><small>Навсегда</small></div>
            <button class="btn-stars" onclick="buyStars(100, 2)">⭐ 100</button>
        </div>
        <div class="list-item">
            <div class="item-info"><b>Ускорение X5</b><small>Навсегда</small></div>
            <button class="btn-stars" onclick="buyStars(200, 5)">⭐ 200</button>
        </div>
    </div>

    <div id="friends-page" class="page">
        <h2>Друзья</h2>
        <button class="btn-buy" style="width:100%" onclick="tg.openTelegramLink('https://t.me' + tg.initDataUnsafe.user.id)">Пригласить друга (+10%)</button>
    </div>

    <nav>
        <div onclick="showPage('game-page', this)" class="active">ИГРА</div>
        <div onclick="showPage('boosts-page', this)">БУСТЫ</div>
        <div onclick="showPage('friends-page', this)">ДРУЗЬЯ</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = JSON.parse(localStorage.getItem('bitclick_hc')) || {
            balance: 0, energy: 1000, maxEnergy: 1000, mt: 1, multiplier: 1, league: "Bronze"
        };

        function updateUI() {
            document.getElementById('balance-val').innerText = Math.floor(data.balance).toLocaleString();
            document.getElementById('energy-val').innerText = Math.floor(data.energy);
            document.getElementById('max-energy-val').innerText = data.maxEnergy;
            document.getElementById('energy-fill').style.width = (data.energy / data.maxEnergy * 100) + '%';
            document.getElementById('mt-lvl').innerText = data.mt;
            document.getElementById('mult-status').innerText = "X" + data.multiplier;
            
            // Цены
            document.getElementById('mt-btn').innerText = (data.mt * 1000).toLocaleString();
            document.getElementById('el-btn').innerText = (data.maxEnergy * 5).toLocaleString();

            // 10 Лиг (Растянуто)
            const leagues = ["Bronze", "Silver", "Gold", "Platinum", "Sapphire", "Emerald", "Ruby", "Diamond", "Master", "Legend"];
            const steps =;
            let currentL = "Bronze League";
            steps.forEach((s, i) => { if(data.balance >= s) currentL = leagues[i+1] + " League"; });
            
            if(data.league !== currentL) {
                data.league = currentL;
                confetti({ particleCount: 100, spread: 60, colors: ['#f3ba2f'] });
            }
            document.getElementById('league-name').innerText = data.league;
            localStorage.setItem('bitclick_hc', JSON.stringify(data));
        }

        document.getElementById('click-area').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.targetTouches.length; i++) {
                if (data.energy >= data.mt) {
                    const val = data.mt * data.multiplier;
                    data.balance += val;
                    data.energy -= data.mt;
                    showTapEffect(e.targetTouches[i].clientX, e.targetTouches[i].clientY, val);
                }
            }
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        function showTapEffect(x, y, v) {
            const n = document.createElement('div');
            n.style.position = 'absolute'; n.style.left = x + 'px'; n.style.top = y + 'px';
            n.style.fontSize = '24px'; n.style.fontWeight = '900'; n.style.color = '#fff';
            n.innerText = '+' + v; n.style.animation = 'floatUp 0.8s forwards';
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 800);
        }

        // Покупки
        function buyMT() {
            let cost = data.mt * 1000;
            if(data.balance >= cost) { data.balance -= cost; data.mt++; updateUI(); }
        }
        function buyEL() {
            let cost = data.maxEnergy * 5;
            if(data.balance >= cost) { data.balance -= cost; data.maxEnergy += 500; updateUI(); }
        }
        function buyStars(stars, mult) {
            tg.showAlert(`Функция оплаты ${stars} Stars будет доступна после подключения платежей в BotFather!`);
            // Для теста можно просто применить:
            // data.multiplier = mult; updateUI();
        }

        // Таймер (Медленный: +1 энергия в сек)
        setInterval(() => {
            if(data.energy < data.maxEnergy) data.energy++;
            updateUI();
        }, 1000);

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        updateUI();
    </script>
    <style> @keyframes floatUp { to { transform: translateY(-100px); opacity: 0; } } </style>
</body>
</html>
