<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitClick Hardcore</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --gold: #f3ba2f; --bg: #000; --star: #62b1f6; --card: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; }
        
        /* Кнопки навигации */
        nav { display: flex; justify-content: space-around; background: #0a0a0a; padding: 20px 0; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        nav div { font-size: 12px; color: #555; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        nav .active { color: var(--gold); }

        .page { display: none; flex-direction: column; align-items: center; height: 85vh; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active-page { display: flex; }

        .header { color: var(--gold); font-weight: bold; margin-top: 10px; letter-spacing: 1px; }
        .score { font-size: 45px; font-weight: 900; margin: 10px 0; }

        /* Монета на CSS (если картинка не грузится) */
        .coin-wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .coin { 
            width: 200px; height: 200px; background: linear-gradient(135deg, #f3ba2f, #ffd700); 
            border-radius: 50%; border: 8px solid #b8860b; box-shadow: 0 0 40px rgba(243, 186, 47, 0.5);
            display: flex; align-items: center; justify-content: center; font-size: 80px; cursor: pointer;
            transition: transform 0.05s;
        }
        .coin:active { transform: scale(0.9); }

        /* Бусты */
        .item { background: var(--card); padding: 15px; margin: 8px 0; border-radius: 15px; width: 100%; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .btn { background: var(--gold); color: #000; padding: 10px 15px; border-radius: 10px; font-weight: bold; border: none; }
        .btn:disabled { background: #444; color: #888; }

        .energy-box { width: 100%; padding-bottom: 80px; }
        .bar { background: #222; height: 12px; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .fill { background: var(--gold); height: 100%; width: 100%; transition: width 0.2s; }

        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Страница ИГРА -->
    <div id="p-game" class="page active-page">
        <div class="header" id="l-name">BRONZE LEAGUE</div>
        <div class="score">💰 <span id="val-b">0</span></div>
        <div class="coin-wrapper">
            <div class="coin" id="coin-btn">₿</div>
        </div>
        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:14px;">
                <span>⚡️ <span id="val-e">1000</span>/<span id="val-me">1000</span></span>
                <span id="val-pps" style="color:var(--star)">+0/s</span>
            </div>
            <div class="bar"><div id="e-fill" class="fill"></div></div>
        </div>
    </div>

    <!-- Страница БУСТЫ -->
    <div id="p-boost" class="page">
        <h2 style="color:var(--gold)">Магазин</h2>
        <div class="item">
            <div><b>Multitap</b><br><small>Lvl <span id="l-mt">1</span></small></div>
            <button class="btn" onclick="buy('mt')" id="b-mt">500</button>
        </div>
        <div class="item">
            <div><b>Energy Cap</b><br><small>Lvl <span id="l-el">1</span></small></div>
            <button class="btn" onclick="buy('el')" id="b-el">1000</button>
        </div>
        <div class="item">
            <div><b>Robot</b><br><small>Lvl <span id="l-rm">0</span></small></div>
            <button class="btn" onclick="buy('rm')" id="b-rm">5000</button>
        </div>
        <button class="btn" style="background:var(--star); width:100%; margin-top:10px;" onclick="alert('Stars payment soon!')">⭐ Turbo X2 (300 Stars)</button>
    </div>

    <!-- Страница ДРУЗЬЯ и ТОП -->
    <div id="p-friends" class="page">
        <h2>Друзья и Топ</h2>
        <button class="btn" style="width:100%" onclick="window.open('https://t.me')">Пригласить</button>
        <div style="width:100%; margin-top:20px; background:#111; border-radius:15px; padding:10px;">
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                <span>1. @CryptoKing</span><b>1.5M</b>
            </div>
            <div style="display:flex; justify-content:space-between; padding:10px; color:var(--gold)">
                <span>ВЫ</span><b id="my-score">0</b>
            </div>
        </div>
    </div>

    <nav>
        <div onclick="tab('p-game', this)" class="active">Игра</div>
        <div onclick="tab('p-boost', this)">Бусты</div>
        <div onclick="tab('p-friends', this)">Друзья</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let s = JSON.parse(localStorage.getItem('bc_v10')) || {
            b: 0, e: 1000, me: 1000, mt: 1, rm: 0,
            lv: { mt: 1, el: 1, rm: 0 }
        };

        function ui() {
            document.getElementById('val-b').innerText = Math.floor(s.b).toLocaleString();
            document.getElementById('my-score').innerText = Math.floor(s.b).toLocaleString();
            document.getElementById('val-e').innerText = Math.floor(s.e);
            document.getElementById('val-me').innerText = s.me;
            document.getElementById('val-pps').innerText = '+' + s.rm + '/s';
            document.getElementById('e-fill').style.width = (s.e / s.me * 100) + '%';
            
            // Бусты цены (рост в 2.8 раза)
            ['mt', 'el', 'rm'].forEach(k => {
                let p = Math.floor({mt:500, el:1000, rm:5000}[k] * Math.pow(2.8, s.lv[k] - (k==='rm'?0:1)));
                let b = document.getElementById('b-'+k);
                b.innerText = p.toLocaleString();
                b.disabled = s.b < p;
                document.getElementById('l-'+k).innerText = s.lv[k];
            });

            // Лиги
            let l = "BRONZE LEAGUE";
            if(s.b > 15000) l = "SILVER LEAGUE";
            if(s.b > 100000) l = "GOLD LEAGUE";
            document.getElementById('l-name').innerText = l;

            localStorage.setItem('bc_v10', JSON.stringify(s));
        }

        // Клик
        document.getElementById('coin-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (s.e >= s.mt) {
                let crit = Math.random() < 0.03;
                let v = crit ? s.mt * 10 : s.mt;
                s.b += v;
                s.e -= s.mt;
                
                // Текст +v
                let n = document.createElement('div');
                n.innerText = (crit ? '🔥 +' : '+') + v;
                n.style.cssText = `position:fixed; left:${e.touches[0].clientX}px; top:${e.touches[0].clientY}px; font-size:30px; font-weight:bold; color:${crit?'#f3ba2f':'#fff'}; animation:fly 0.7s forwards; pointer-events:none; z-index:100;`;
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 700);

                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred(crit ? 'heavy' : 'light');
            }
            ui();
        });

        function buy(k) {
            let p = Math.floor({mt:500, el:1000, rm:5000}[k] * Math.pow(2.8, s.lv[k] - (k==='rm'?0:1)));
            if (s.b >= p) {
                s.b -= p;
                s.lv[k]++;
                if(k==='mt') s.mt++;
                if(k==='el') { s.me += 500; s.e = s.me; }
                if(k==='rm') s.rm++;
                ui();
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        // Цикл (Реген 2/сек + Майнинг)
        setInterval(() => {
            if (s.e < s.me) s.e = Math.min(s.me, s.e + 2);
            if (s.rm > 0) s.b += s.rm / 10;
            ui();
        }, 100);

        ui();
    </script>
</body>
</html>
